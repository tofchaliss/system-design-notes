name: Generate README

on:
  push:
    paths:
      - concepts/components.md

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate README from headers
        run: |
          grep -E '^#{1,6} ' concepts/components.md > README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add README.md
          git commit -m "Auto-update README"
          git push
