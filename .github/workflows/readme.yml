- name: Generate README from headers
  run: |
    echo "# 📚 Components Index" > README.md
    echo "" >> README.md

    awk '
    function anchor(text) {
      text = tolower(text)
      gsub(/[^\w\s-]/, "", text)
      gsub(/\s+/, "-", text)
      return text
    }

    /^#{1,6} / {
      level = length($1)
      $1 = ""
      title = substr($0, 2)
      gsub(/^ +/, "", title)

      indent = ""
      for (i = 1; i < level; i++) indent = indent "  "

      print indent "- [" title "](concepts/components.md#" anchor(title) ")"
    }
    ' concepts/components.md >> README.md
